[pytest]
# ==========================================
# 1. Базовые настройки поиска тестов
# ==========================================
# Ограничиваем область сканирования только папкой tests/ (ускоряет сборку тестов)
pythonpath = .
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# ==========================================
# 2. Флаги запуска по умолчанию (addopts)
# ==========================================
# -v: Подробный вывод (Verbose).
# --strict-markers: Запрещает использование незарегистрированных маркеров (защита от опечаток вроде @pytest.mark.untt).
# --cov: Автоматический сбор покрытия кода.
# --cov-report: Вывод покрытия в терминал (скрывая покрытые на 100% файлы) и генерация XML для SonarQube/GitLab.
addopts = 
    -v 
    --strict-markers 
    --cov=src 
    --cov-report=term-missing:skip-covered 
    --cov-report=xml

# ==========================================
# 3. Настройки Asyncio (FastAPI & SQLAlchemy)
# ==========================================
# Автоматически распознавать async def тесты и фикстуры
asyncio_mode = auto
# Разрешить асинхронным фикстурам жить весь цикл тестирования (scope="session")
asyncio_default_fixture_loop_scope = session
# Тесты тоже должны бежать в том же event loop, что и session-фикстуры
asyncio_default_test_loop_scope = session

# ==========================================
# 4. Регистрация маркеров (Test Pyramid)
# ==========================================
markers =
    architecture: [🛡 Guard] Архитектурные тесты (проверка изоляции слоев Clean Arch).
    unit: [⚡ Unit] Быстрые доменные тесты бизнес-логики (БЕЗ I/O, БД и сети). Скорость: < 0.01s.
    integration: [🔌 Integration] Интеграционные тесты (CQRS/Репозитории) с реальной БД через Testcontainers.
    e2e: [🚀 E2E] Сквозные тесты API и роутеров FastAPI через httpx.AsyncClient.
    load: [📊 Load] Resilience and threshold testing (Locust).

# ==========================================
# 5. Подавление предупреждений (Clean Logs)
# ==========================================
# Убираем спам от сторонних библиотек, чтобы логи в CI/CD (GitHub Actions) оставались чистыми.
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
    